<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>REI Workbench</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>REI Workbench</h1>
          <p id="ollamaStatus">Ollama: checking</p>
        </div>
        <div class="top-actions">
          <button id="refreshModelsBtn" type="button">Refresh models</button>
          <button id="clearHistoryBtn" type="button">Clear history</button>
        </div>
      </header>

      <main class="workspace">
        <section class="prompt-pane" aria-label="Prompt editor">
          <div class="section-head">
            <h2>Navodila</h2>
            <span id="promptMeta" class="meta-pill">baseline</span>
          </div>
          <nav id="promptTabs" class="tabs" aria-label="Prompt tabs"></nav>
          <textarea id="promptEditor" spellcheck="false"></textarea>
          <div class="prompt-actions">
            <button id="savePromptBtn" type="button">Save prompt</button>
            <button id="resetPromptBtn" type="button">Reset baseline</button>
          </div>
          <div id="requiredKeys" class="keys"></div>
        </section>

        <section class="run-pane" aria-label="Run controls">
          <div class="section-head">
            <h2>Test</h2>
            <span id="activeRun" class="meta-pill">idle</span>
          </div>

          <div class="input-grid">
            <label class="field span-2">
              <span>Input</span>
              <textarea id="testInput" rows="5" placeholder="Vnesi minimum inputa..."></textarea>
            </label>
            <label class="field">
              <span>Profile</span>
              <select id="profileSelect"></select>
            </label>
            <label class="field toggle-row">
              <span>Kanon kontekst</span>
              <input
                id="referenceToggle"
                type="checkbox"
                checked
                title="Doda REI reference context iz knowledge/ v Ollama klic."
              />
            </label>
          </div>

          <div id="settingsGrid" class="settings-grid"></div>

          <div class="run-actions">
            <button type="button" data-run="mind" data-target="racio">Run Racio</button>
            <button type="button" data-run="mind" data-target="emocio">Run Emocio</button>
            <button type="button" data-run="mind" data-target="instinkt">Run Instinkt</button>
            <button type="button" data-run="ego">Run Ego</button>
            <button id="runFullBtn" type="button">Run all</button>
            <button id="stopBtn" type="button" disabled>Stop</button>
          </div>

          <div id="outputGrid" class="output-grid"></div>
        </section>

        <section class="dataset-pane" aria-label="Dataset editor">
          <div class="section-head">
            <h2>Dataset</h2>
            <span id="datasetSummary" class="meta-pill">none</span>
          </div>

          <div class="dataset-controls">
            <label class="field">
              <span>Dataset</span>
              <select id="datasetSelect"></select>
            </label>
            <label class="field">
              <span>Target</span>
              <select id="datasetTargetFilter">
                <option value="">All</option>
                <option value="racio">Racio</option>
                <option value="emocio">Emocio</option>
                <option value="instinkt">Instinkt</option>
                <option value="ego_resultant">EgoResultant</option>
              </select>
            </label>
            <label class="field">
              <span>Status</span>
              <select id="datasetStatusFilter">
                <option value="">All</option>
                <option value="draft">draft</option>
                <option value="needs_edit">needs_edit</option>
                <option value="approved">approved</option>
                <option value="rejected">rejected</option>
              </select>
            </label>
            <label class="field">
              <span>Profile</span>
              <select id="datasetProfileFilter">
                <option value="">All</option>
              </select>
            </label>
            <div class="dataset-actions">
              <button id="refreshDatasetsBtn" type="button">Refresh</button>
              <button id="validateDatasetBtn" type="button">Validate</button>
              <button id="exportDatasetBtn" type="button">Export</button>
            </div>
          </div>

          <div class="dataset-workspace">
            <div id="datasetList" class="dataset-list"></div>
            <div class="dataset-editor">
              <div id="datasetScenario" class="dataset-scenario">No dataset example selected.</div>
              <div id="datasetValidation" class="dataset-validation"></div>
              <div class="dataset-form">
                <label class="field">
                  <span>Status</span>
                  <select id="datasetStatusSelect">
                    <option value="draft">draft</option>
                    <option value="needs_edit">needs_edit</option>
                    <option value="approved">approved</option>
                    <option value="rejected">rejected</option>
                  </select>
                </label>
                <label class="field">
                  <span>Split</span>
                  <select id="datasetSplitSelect">
                    <option value="">auto</option>
                    <option value="train">train</option>
                    <option value="validation">validation</option>
                    <option value="test">test</option>
                  </select>
                </label>
                <label class="field">
                  <span>Reviewer</span>
                  <input id="datasetReviewer" type="text" />
                </label>
              </div>
              <label class="field dataset-notes">
                <span>Review notes</span>
                <textarea id="datasetNotes" rows="2"></textarea>
              </label>
              <label class="field dataset-json">
                <span>Assistant payload JSON</span>
                <textarea id="datasetJsonEditor" spellcheck="false"></textarea>
              </label>
              <div class="dataset-save-row">
                <button id="saveDatasetExampleBtn" type="button">Save example</button>
                <button type="button" data-dataset-status="approved">Approve</button>
                <button type="button" data-dataset-status="needs_edit">Needs edit</button>
                <button type="button" data-dataset-status="rejected">Reject</button>
              </div>
            </div>
          </div>
        </section>

        <section class="history-pane" aria-label="History">
          <div class="section-head">
            <h2>Zgodovina</h2>
            <span id="historyCount" class="meta-pill">0</span>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </main>
    </div>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
