schema_version: rei-native-emocio-v2
status: architecture_canon
runtime_effect: active_from_b6
canon_language: sl
mind_id: E
canonical_name: Emocio

identity:
  status: implementation_hypothesis
  canonical_sl: >-
    Emocio je vizualno-prizorni, mozaični, primerjalni, izkustveni in
    motorno usmerjeni REI procesor. Ni sinonim za čustvo in ni generator slik.
  en_gloss: visual-scenic, comparative, experiential and motor-oriented REI processor
  source_claim_ids: [C-EMOCIO-001, C-EMOCIO-002, C-NATIVE-001]

native_flow:
  status: implementation_hypothesis
  ordered_steps:
    - VisualSceneCompiler
    - VisualSceneMemory
    - EmocioVisualState
    - CounterfactualSceneRollouts
    - VisualValuation
    - EmocioNativeConclusion
    - freeze_conclusion_and_artifacts
    - EmocioManifestation
    - RacioInterpretation
  source_claim_ids: [C-EMOCIO-003, C-BUNDLE-001]

input_contract:
  contract_status: implemented_in_b6
  status: implementation_hypothesis
  canonical_name: EmocioInputPacket
  fields:
    - scene_id
    - source_scene_hash
    - grounded_visual_cues
    - social_layout
    - actor_positions
    - observed_attention
    - movement_cues
    - aesthetic_cues
    - explicit_identity_cues
    - allowed_option_ids
    - evidence_ids
    - caveat
  router_must_not_prewrite:
    - Emocieva želja
    - Emociev strah
    - Emocieva izbira
  source_claim_ids: [C-PROV-001, C-NATIVE-002, C-EMOCIO-002]

scene_contract:
  contract_status: implemented_in_b6
  status: implementation_hypothesis
  canonical_name: VisualSceneSpec
  scene_kinds: [current, desired, broken, option_rollout]
  fields:
    - scene_id
    - scene_kind
    - option_id
    - entities
    - self_position
    - attention_structure
    - group_belonging
    - status_relations
    - movement
    - composition
    - attraction_markers
    - obstacle_markers
    - grounded_evidence_ids
    - inferred_elements
  source_claim_ids: [C-EMOCIO-002, C-PROV-001]

visual_state_contract:
  contract_status: implemented_in_b6
  status: implementation_hypothesis
  fields:
    - source_scene_id
    - source_packet_id
    - current_scene
    - desired_scene
    - broken_scene
    - option_rollouts
    - option_valuations
  source_claim_ids: [C-EMOCIO-002, C-EMOCIO-003]

valuation:
  status: implementation_hypothesis
  implemented_in: B6
  dimensions:
    - desired_scene_match
    - distance_from_broken_scene
    - self_visibility
    - belonging
    - attention
    - attraction
    - novelty
    - movement
    - status
    - competitive_success
    - attack_or_breakthrough_affordance
  exact_structured_atom_matching: true
  semantic_keyword_classifier: false
  absent_reference_score: 0.5
  arithmetic_precision_decimals: 6
  aggregate: equal_arithmetic_mean_of_11_dimensions
  unique_maximum_selects_option: true
  exact_maximum_tie_abstains: true
  initial_selected_action_tendency: approach
  calibration_status: uncalibrated_fixture_policy
  source_claim_ids: [C-EMOCIO-002]

native_conclusion_contract:
  contract_status: implemented_in_b6
  status: implementation_hypothesis
  fields:
    - mind
    - option_id
    - desired_transformation
    - current_scene_id
    - desired_scene_id
    - decisive_rollout_scene_id
    - main_obstacle
    - action_tendency
    - valuation_dimensions
    - intensity
    - abstains
    - uncertainty
  action_tendencies:
    - approach
    - perform
    - compete
    - connect
    - attack
    - improvise
    - withdraw_contact
    - unknown
  invariants:
    mind_is_E: true
    precedes_manifestation: true
    precedes_racio_interpretation: true
  source_claim_ids: [C-EMOCIO-003, C-BUNDLE-001]

manifestation_contract:
  contract_status: implemented_in_b9
  schema_origin: documented_for_b2
  status: implementation_hypothesis
  consolidated_contract: knowledge/canon_v2/communication.yaml
  fields:
    - visible_image_artifact_ids
    - attraction_intensity
    - aversion_intensity
    - anger_intensity
    - motor_urge
    - social_pull
  is_complete_native_conclusion: false
  b9_projection_policy: b9_fixture_emocio_projection_v1
  b9_structured_observation_policy: b9-structured-observation-v1
  projection_formulas_are_empirically_calibrated: false
  renderer_failure_or_no_image_still_allows_manifestation: true
  native_conclusion_may_be_mutated: false
  source_claim_ids: [C-CONSC-001, C-EMOCIO-003]

renderer_boundary:
  status: implementation_hypothesis
  contract_status: implemented_in_b7
  required_for_first_poc: false
  batch_protocol_signature: >-
    render(scenes: tuple[VisualSceneSpec, ...], seed: int)
    -> ImageRenderBatchOutcome
  provider_protocol_signature: >-
    render(request: ImageRenderRequest, call: ProviderCallSpec)
    -> ImageRenderItemOutcome
  semantic_precedence:
    - SceneEvent_grounded_evidence
    - VisualSceneSpec
    - generated_image
  image_artifact_metadata:
    - provider
    - model
    - revision
    - seed
    - input_spec_hash
    - prompt
    - negative_prompt
    - path
    - width
    - height
    - generated_only_elements
    - grounded_mask_if_any
  generated_details_are_grounded: false
  renderer_failure_changes_native_conclusion: false
  first_adapter: NullRenderer
  null_renderer_implemented_in: B6
  concrete_local_renderer_implemented_in: B7
  concrete_local_renderer: DiffusersImageRenderer
  local_batch_coordinator: LocalEmocioRenderer
  supported_modes: [text_to_image, image_to_image]
  request_contract:
    content_addressed: true
    exact_source_spec_hash_required: true
    explicit_fields:
      - provider_identity
      - model
      - immutable_model_revision
      - pipeline_implementation_and_revision
      - runtime_and_load_parameters
      - seed
      - prompt
      - negative_prompt
      - width
      - height
      - num_inference_steps
      - guidance_scale
      - source_image_id_hash_path_if_img2img
      - strength_if_img2img
    text_to_image_forbids_source_and_strength: true
    image_to_image_requires_source_and_strength: true
    image_to_image_preserves_source_dimensions: true
    hidden_numeric_defaults: false
  seed_policy:
    explicit_root_seed_required: true
    deterministic_per_scene_seed: true
    derivation: >-
      low 63 bits of the first 16 hex digits of SHA-256 over
      algorithm=rei-emocio-scene-seed-v1, root_seed and source_spec_id
    fallback_actual_seed_is_attempt_specific: true
  artifact_integrity:
    initial_media_type: image/png
    atomic_write: true
    content_sha256_verified_against_bytes: true
    complete_png_chunks_crc_idat_iend_and_dimensions_verified: true
    image_id_binds_request_id_and_content_sha256: true
    img2img_source_hash_reverified_before_call: true
    portable_relative_paths_only: true
  failure_contract:
    batch_statuses: [disabled, succeeded, partial, failed]
    structured_call_record_retained: true
    pre_call_preparation_failure_retained: true
    every_non_disabled_batch_covers_every_source_scene: true
    invalid_outputs_quarantined: true
    implicit_provider_retry: false
    fallback_is_frozen_native_conclusion: true
  local_stack_verified_2026_07_13:
    torch: 2.13.0
    diffusers: 0.39.0
    transformers: 5.13.0
    accelerate: 1.14.0
    safetensors: 0.8.0
    Pillow: 12.3.0
  final_model_selected: false
  runtime_requires_explicit_model_repository: true
  runtime_requires_immutable_40_hex_hub_commit: true
  runtime_loads_local_files_only: true
  actual_image_generated_in_b6: false
  actual_model_image_generated_in_b7_tests: false
  deterministic_png_fixture_generated_in_b7_tests: true
  source_claim_ids: [C-EMOCIO-004, C-PROV-001]

global_invariants:
  - canonical_sl: Emociev sklep je zamrznjen pred Racijevo interpretacijo.
    source_claim_ids: [C-EMOCIO-003]
  - canonical_sl: Generirana slika ne ustvarja novih dejstev o dogodku.
    source_claim_ids: [C-EMOCIO-004, C-PROV-001]
  - canonical_sl: Besedni opis Emocia je Racijeva interpretacija manifestacije.
    source_claim_ids: [C-CONSC-001]

open_question_ids:
  - OQ-NATIVE-001
  - OQ-EMOCIO-001
  - OQ-RANGE-001
  - OQ-SCHEMA-001
  - OQ-NAMING-001
