schema_version: rei-native-communication-v2
status: architecture_canon
runtime_effect: active_from_b9
canon_language: sl
phase: B9

claim_boundary:
  canonical_sl: >-
    B9 loči omejeno manifestacijo Emocia ali Instinkta, Racijevo zmotljivo
    interpretacijo in naknadno diagnostično vrzel prevoda. Vse konkretne
    projekcijske formule, fixture politike in metrične oznake v
    tem dokumentu so implementation_hypothesis, ne univerzalna psihološka ali
    vzročna trditev.
  direct_source_boundary:
    - E_and_I_are_not_directly_conscious
    - conscious_access_to_E_and_I_is_mediated_by_Racio
    - acceptance_supports_cooperation_tolerance_and_delegation
  software_operationalizations:
    - manifestation_schemas
    - observation_serialization
    - interpreter_protocols
    - translation_gap_metric
    - distortion_classifier
    - acceptance_fidelity_audit
  empirical_psychology_claim: false
  medical_or_diagnostic_claim: false
  source_claim_ids: [C-CONSC-001, C-ACCEPT-001, C-SAFETY-001]

canonical_sequence:
  status: architecture_invariant
  ordered_steps:
    - freeze_EmocioNativeConclusion_and_artifacts
    - freeze_InstinktNativeConclusion_and_artifacts
    - freeze_NativeMindBundle
    - build_limited_E_and_I_manifestations
    - Racio_interprets_manifestations
    - evaluator_builds_TranslationGap
  interpretation_creates_or_mutates_native_conclusion: false
  translation_gap_is_interpreter_input: false
  source_claim_ids: [C-BUNDLE-001, C-EMOCIO-003, C-INSTINKT-003, C-CONSC-001]

responsibility_boundary:
  status: architecture_invariant
  implemented_or_specified_in_b9:
    - EmocioManifestation_projection
    - InstinktManifestation_consumption
    - ManifestationObservation_projection
    - ManifestationInterpreter_protocol
    - scripted_no_provider_interpreter_fixture
    - deterministic_no_model_FakeVisionLanguageInterpreter
    - RacioInterpretation
    - AcceptanceFidelityAudit
    - TranslationGap_diagnostic_evaluator
  excluded_until_b10:
    - RacioCommitter
    - RacioNarrator
    - ConsciousDecision
    - BehaviorResultant
    - behavior_resolution_table
    - governance_to_conscious_commit_mapping
  source_claim_ids: [C-RACIO-003, C-CONSC-003, C-BEHAV-001]

interpreter_input_boundary:
  status: architecture_invariant
  allowed_semantic_inputs:
    - EmocioManifestation
    - InstinktManifestation
    - ManifestationObservation
