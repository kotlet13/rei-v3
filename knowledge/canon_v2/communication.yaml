plan_high_fidelity_test_boundary:
  plan_test_name: test_high_fidelity_reduces_translation_gap
  status: implementation_hypothesis
  record_only_audit_proves_monotonicity: false
  universal_psychological_or_causal_claim: false
  permitted_controlled_fixture_interpretation: >-
    Test lahko uporabi vnaprej deklariran par scripted interpretacij, pri
    katerem se high-fidelity fixture namenoma ujema v tipizirani action tendency,
    low-fidelity fixture pa se namenoma ne ujema. Tak test preveri pipeline,
    provenance in pričakovano razliko tega para, ne dokazuje, da AcceptanceState
    numerično povzroča manjšo vrzel v splošnem.
  required_fixture_disclosure:
    - exact_acceptance_states
    - exact_scripts
    - exact_expected_gaps
    - no_hidden_threshold_or_keyword_rule
  recommended_precise_test_name: test_scripted_high_fidelity_fixture_has_smaller_exact_gap
  general_mapping_remains_open_under:
    - OQ-TRANSLATION-001
    - OQ-ACCEPTANCE-001
    - OQ-ACCEPTANCE-002
  source_claim_ids: [C-ACCEPT-003, C-RACIO-003]

exact_action_tendency_fidelity_metric:
  policy_id: b9-exact-action-tendency-fidelity-v1
  status: implementation_hypothesis
  components:
    count: 1
    facet: action_tendency
    weight: 1.0
    native_value: native_conclusion.action_tendency
    interpreted_value: RacioInterpretation.inferred_action_tendency
  exact_metric_formula: >-
    component score = 1.0 iff the typed native and interpreted action tendencies
    are exactly equal; otherwise 0.0
  interpreted_null_score: 0.0
  text_normalization_or_fuzzy_matching: false
  schema_field_motive_fidelity: mirrors_the_single_action_tendency_component_score
  schema_field_name_is_semantic_motive_claim: false
  empirical_or_semantic_motive_fidelity_claim: false
  source_claim_ids: [C-RACIO-003, C-ACCEPT-003]

native_motive_summary_policy:
  policy_id: b9-native-motive-summary-v1
