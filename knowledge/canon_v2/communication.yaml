  behavior_in_b9: consume_and_validate_without_recomputing_native_conclusion
  formula_source: knowledge/canon_v2/instinkt.yaml#b8_manifestation
  source_conclusion_body_state_and_decisive_rollout_lineage_required: true
  source_claim_ids: [C-CONSC-001, C-INSTINKT-003, C-PROV-001]

structured_observation_policy:
  contract_status: implemented_in_b9
  policy_id: b9-structured-observation-v1
  status: implementation_hypothesis
  manifestation_order: [E, I]
  within_mind_manifestation_order: manifestation_id_ascending
  content_encoding: field_name=canonical_json_scalar
  score_rounding_added_by_b9: false
  emocio_field_order:
    - attraction_intensity
    - aversion_intensity
    - anger_intensity
    - motor_urge
    - social_pull
  emocio_visible_image_order: image_id_ascending_after_structured_fields
  emocio_visible_image_observation:
    content_encoding: visible_image_artifact_id={image_id}
    provenance: renderer_added_ungrounded
    source_image_artifact_id_required: true
    semantic_caption_implied: false
  optional_emocio_renderer_interpretation_observation:
    canonical_order: after_visible_image_identity_observations
    value_fields: [interpretation, inferred_claims]
    provenance: renderer_added_ungrounded
    same_visible_image_id_and_hash_required: true
    provider_result_id_and_hash_required: true
    generated_detail_becomes_grounded: false
  instinkt_field_order:
    - felt_tension
    - fear_intensity
    - attachment_pull
    - withdrawal_urge
    - freeze_intensity
    - boundary_alarm
    - raw_urge
  manifested_field_provenance: manifested
  instinkt_may_cite_image_artifact: false
  source_claim_ids: [C-CONSC-001, C-PROV-001]

manifestation_observation_invariants:
  status: architecture_invariant
  manifestation_ids_nonempty_unique_and_exact_scope: true
  manifested_observation_may_cite_image: false
  renderer_added_ungrounded_must_cite_image: true
  cited_image_must_be_visible_in_same_EmocioManifestation: true
