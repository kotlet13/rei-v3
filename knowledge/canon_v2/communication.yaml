  source_claim_ids: [C-CONSC-001, C-RACIO-003, C-BUNDLE-001]

manifestation_contract:
  contract_status: implemented_in_b9
  status: implementation_hypothesis
  meaning: limited_observable_projection_not_complete_native_conclusion
  output_scores_range: [0.0, 1.0]
  missing_required_score_silently_defaults_to_neutral: false
  source_claim_ids: [C-CONSC-001, C-EMOCIO-003, C-INSTINKT-003, C-STATE-001]

emocio_projection_policy:
  policy_id: b9_fixture_emocio_projection_v1
  status: implementation_hypothesis
  claim_boundary: >-
    To je deterministična fixture projekcija obstoječih strukturiranih B6
    vrednosti. Poimenovanja attraction, aversion, anger in social pull niso
    empirično kalibrirana čustvena merila.
  selected_conclusion:
    attraction_intensity: >-
      conclusion.intensity when action_tendency is one of approach, perform,
      compete, connect, or improvise; otherwise 0.0
    aversion_intensity: >-
      conclusion.intensity when action_tendency is attack or withdraw_contact;
      otherwise 0.0
    anger_intensity: >-
      conclusion.intensity when action_tendency is attack; otherwise 0.0
    motor_urge: structured_tendency:{action_tendency}
    social_pull: >-
      structured_social_pull:toward_connection for connect;
      structured_social_pull:away_from_contact for withdraw_contact;
      structured_social_pull:unspecified otherwise
  abstaining_conclusion:
    attraction_intensity: 0.0
    aversion_intensity: 0.0
    anger_intensity: 0.0
    motor_urge: structured_tendency:unknown
    social_pull: structured_social_pull:unspecified
    zero_semantics: no_projected_signal_not_neutral_psychology
  visible_image_selection:
    eligible_source_specs:
      - current_scene_id
      - desired_scene_id
      - decisive_rollout_scene_id_when_present
    select_all_valid_supplied_images: true
    canonical_order: image_id_ascending
    duplicate_image_ids_rejected: true
    no_image_or_renderer_failure_yields: []
    generated_images_are_grounded: false
    image_is_required_for_manifestation: false
  lineage:
    source_conclusion_id_and_hash_required: true
    visible_image_ids_and_hashes_required_when_present: true
    manifestation_content_id_and_hash_required: true
    native_conclusion_may_be_mutated: false
  source_claim_ids: [C-CONSC-001, C-EMOCIO-003, C-EMOCIO-004, C-PROV-001]

instinkt_projection_policy:
  policy_id: b8-instinkt-manifestation-v1
