c3_conscious_access_boundary:
  contract_status: implemented_in_c3
  policy_id: c3-conscious-access-filter-v1
  status: implementation_hypothesis
  selected_relation:
    source_E: R_to_E
    source_I: R_to_I
  formulas:
    suppression: (1-tolerance)*sabotage_risk
    effective_visibility: visibility*(1-suppression)
    signal_fidelity: interpretation_fidelity*(1-0.5*sabotage_risk)
    signal_noise: 1-signal_fidelity
    delegation_openness: delegation_willingness
    channel_quality: >-
      effective_visibility*(0.70*signal_fidelity + 0.15*tolerance +
      0.15*delegation_openness)
  deterministic_selection:
    rank_material: [policy_id, public_packet_alias, explicit_seed, stage]
    visible_count: ceil(admitted_observation_count*effective_visibility)
    minimum_when_positive: 1
    clear_count: ceil(visible_observation_count*signal_fidelity)
    degraded_value_policy: redact_exact_value_without_inversion_or_invention
  zero_effective_visibility:
    visible_observations: []
    visible_artifacts: []
    channel_quality: 0.0
  provider_visible:
    - source_mind
    - language
    - ablation_mode
    - opaque_observation_aliases_and_perceived_values
    - omitted_and_degraded_opaque_aliases
    - opaque_artifact_aliases_and_public_media_metadata
    - opaque_option_aliases_and_public_descriptions
    - channel_quality
    - uncertainty
  trusted_audit_only:
    - request_and_acceptance_ids_and_hashes
    - actual_observation_option_and_artifact_ids_and_hashes
    - manifestation_and_native_lineage
    - exact_acceptance_dimensions_and_derived_filter_values
  provider_payload_contains_packet_or_audit_hashes: false
  hidden_native_non_interference_required: true
  degraded_signal_may_invent_or_reverse_value: false
  empirical_psychology_claim: false
  source_claim_ids: [C-ACCEPT-001, C-CONSC-001, C-PROV-001]

