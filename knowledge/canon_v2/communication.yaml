option_and_abstention_semantics:
  policy_id: b9-option-comparison-v1
  status: implementation_hypothesis
  inferred_option_id_null_means: interpreter_made_no_option_inference
  inferred_option_id_null_does_not_mean:
    - provider_failure
    - proof_that_native_mind_abstained
    - high_fidelity
  provider_failure: separate_attempt_outcome_without_RacioInterpretation
  native_null_and_interpreted_null:
    B2_option_match_boolean: true
    option_comparison_applicable: false
    distortion_type_for_evaluated_comparison: unknown
    automatic_motive_fidelity_or_translation_success: false
  native_nonnull_and_interpreted_null: >-
    omission when interpretation status is omitted_b9 or unavailable_b9;
    otherwise misclassification
  native_null_and_interpreted_nonnull: misclassification
  different_nonnull_options: misclassification
  source_claim_ids: [C-CONSC-001, C-RACIO-003]

distortion_classification_policy:
  policy_id: b9-exact-distortion-classifier-v1
  status: implementation_hypothesis
  ordered_rules:
    - when: interpretation_status_is_omitted_b9_or_unavailable_b9
      distortion_type: omission
    - when: native_option_and_interpreted_option_are_both_null
      distortion_type: unknown
    - when: option_match_and_exact_action_tendency_fidelity_is_1
      distortion_type: none
    - when: option_mismatch_or_exact_action_tendency_fidelity_is_0
      distortion_type: misclassification
    - when: otherwise
      distortion_type: unknown
  never_auto_inferred_by_v1:
    - rationalization
    - minimization
    - projection
  richer_type_requires_explicit_evaluator_evidence: true
  keyword_classification: false
  psychological_diagnosis: false
  source_claim_ids: [C-RACIO-003, C-ACCEPT-003, C-SAFETY-001]

